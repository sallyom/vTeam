apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-agentic-operator
rules:
# AgenticSession CRs: watch for events, get for verification, update status after processing
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions/status
  verbs:
  - update
# ProjectSettings CRs: create defaults for new namespaces, read config, update reconciliation status
- apiGroups:
  - vteam.ambient-code
  resources:
  - projectsettings
  verbs:
  - get
  - list
  - watch
  - create
- apiGroups:
  - vteam.ambient-code
  resources:
  - projectsettings/status
  verbs:
  - update
# Namespaces: watch for managed label, get for verification during session processing
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# Jobs: get for existence check, create for session execution
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - get
  - create
# Pods: list to find job pods, get logs for failure diagnostics
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - list
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
# PVCs: get for existence check, create workspace storage for new namespaces
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - get
  - create
# Services: get for existence check, create content service for new namespaces
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - create
# Deployments: create content service deployments for new namespaces
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
# RoleBindings: get for existence check, create from ProjectSettings groupAccess config
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  verbs:
  - get
  - create


