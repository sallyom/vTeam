apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-project-admin
rules:
# AgenticSessions and ProjectSettings (full CRUD)
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions
  - projectsettings
  - rfeworkflows
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions/status
  - projectsettings/status
  - rfeworkflows/status
  verbs:
  - get
  - update
  - patch
# Secrets and ConfigMaps (full management)
- apiGroups:
  - ""
  resources:
  - secrets
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# ServiceAccounts: full CRUD for access key management and runner token provisioning
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Token creation: create access key and runner tokens for authentication
- apiGroups:
  - ""
  resources:
  - serviceaccounts/token
  verbs:
  - create
# RBAC: full management for project permissions and session runner access
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Jobs: get/list/watch for monitoring, delete for stopSession operation
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
  - delete
# Pods (monitoring)
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
# Namespaces: Cluster-scoped for project/namespace lifecycle management
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
  - update
  - patch
# OpenShift Projects: Cluster-scoped for OpenShift project lifecycle management
- apiGroups:
  - project.openshift.io
  resources:
  - projects
  verbs:
  - get
  - list
  - watch
  - update
  - patch
