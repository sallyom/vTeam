apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-backend-api
rules:
# ServiceAccounts: get needed to read SA for JWT parsing, patch for last-used annotations
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - get
  - patch

# RFEWorkflow CRs: CRUD operations for workflow management API endpoints
- apiGroups:
  - vteam.ambient-code
  resources:
  - rfeworkflows
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - vteam.ambient-code
  resources:
  - rfeworkflows/status
  verbs:
  - get
  - update
  - patch


