apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-agenticsessions-aggregate-to-admin
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
rules:
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions
  verbs:
  - "*"
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions/status
  verbs:
  - get
  - update
  - patch


