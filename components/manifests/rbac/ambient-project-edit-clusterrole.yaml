apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-project-edit
rules:
# AgenticSessions (full CRUD)
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - vteam.ambient-code
  resources:
  - agenticsessions/status
  verbs:
  - get
  - update
  - patch
# RFEWorkflows (full CRUD)
- apiGroups:
  - vteam.ambient-code
  resources:
  - rfeworkflows
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - vteam.ambient-code
  resources:
  - rfeworkflows/status
  verbs:
  - get
  - update
  - patch
# ProjectSettings (read-only)
- apiGroups:
  - vteam.ambient-code
  resources:
  - projectsettings
  verbs:
  - get
  - list
  - watch
# ConfigMaps (read Git config during session creation)
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
# Secrets (only for creating runner tokens during session provisioning)
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
# Jobs (session management - can delete jobs during stopSession)
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
  - delete
# Pods (monitoring)
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
# ServiceAccounts: get/list for access key mgmt, create/update/patch for runner token provisioning
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - get
  - list
  - create
  - update
  - patch
# RBAC: get/list for perm checks, create/update/patch/delete for session runner permissions
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - create
  - update
  - patch
  - delete
# Token creation: create runner tokens for per-session authentication
- apiGroups:
  - ""
  resources:
  - serviceaccounts/token
  verbs:
  - create